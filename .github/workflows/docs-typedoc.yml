name: TypeDoc API Documentation

on:
  push:
    branches:
      - main
      - copilot/**
  pull_request:
    branches:
      - main

jobs:
  docs:
    name: Build and Check API Docs
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Generate TypeDoc documentation
        run: bunx typedoc --options typedoc.json

      - name: Validate docs are up-to-date on pull requests
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          if [ -n "$(git status --porcelain -- docs/api)" ]; then
            echo "::error::Generated API docs are stale. Run 'bunx typedoc' locally and commit the docs/api changes."
            git --no-pager diff -- docs/api | head -n 200
            exit 1
          fi

      - name: Upload generated docs artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: typedoc-api
          path: docs/api
          retention-days: 7

      - name: Commit generated docs on push
        if: github.event_name == 'push' && github.actor != 'github-actions[bot]'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: update generated TypeDoc API"
          file_pattern: docs/api/**
