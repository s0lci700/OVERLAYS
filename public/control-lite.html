<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>DADOS & RISAS — Control (Lite)</title>
    <style>
      body{font-family:system-ui,Segoe UI,Arial;padding:18px;background:#0f1720;color:#fff}
      h1{font-size:20px;margin-bottom:8px}
      .char{background:#081226;padding:10px;border-radius:8px;margin:8px 0;display:flex;align-items:center;justify-content:space-between}
      .meta{font-size:13px;color:#90a0b0}
      button{margin-left:6px}
      .controls{display:flex;gap:6px}
      .roll{margin-top:14px;padding:10px;background:#06121a;border-radius:8px}
      label{display:inline-block;margin-right:6px}
    </style>
  </head>
  <body>
    <h1>DADOS & RISAS — Control Lite</h1>
    <div id="chars"></div>

    <div class="roll">
      <h2 style="margin:0 0 8px 0">Roll Dice</h2>
      <label>Char:</label>
      <select id="roll-char"></select>
      <label style="margin-left:8px">Die:</label>
      <select id="sides"><option value="20">d20</option><option value="6">d6</option><option value="8">d8</option></select>
      <label style="margin-left:8px">Modifier:</label>
      <input id="modifier" type="number" value="0" style="width:60px">
      <button id="roll-btn">Roll</button>
      <div id="roll-result" style="margin-top:8px;color:#cfe"></div>
    </div>

    <script>
      async function fetchChars() {
        const res = await fetch('/api/characters');
        if (!res.ok) return [];
        return res.json();
      }

      function formatHp(c){return `${c.hp_current} / ${c.hp_max}`}

      async function render(){
        const chars = await fetchChars();
        const container = document.getElementById('chars');
        container.innerHTML='';
        const rollChar = document.getElementById('roll-char');
        rollChar.innerHTML='';
        chars.forEach(c=>{
          const div=document.createElement('div');div.className='char';
          const left=document.createElement('div');
          const nameDiv=document.createElement('div');nameDiv.style.fontWeight='700';nameDiv.textContent=c.name;
          const metaDiv=document.createElement('div');metaDiv.className='meta';metaDiv.textContent=`${c.player} • ${formatHp(c)}`;
          left.append(nameDiv,metaDiv);
          const controls=document.createElement('div');controls.className='controls';
          const dmg5=document.createElement('button');dmg5.textContent='-5';dmg5.onclick=()=>updateHp(c.id,c.hp_current-5);
          const dmg10=document.createElement('button');dmg10.textContent='-10';dmg10.onclick=()=>updateHp(c.id,c.hp_current-10);
          const heal=document.createElement('button');heal.textContent='Full';heal.onclick=()=>updateHp(c.id,c.hp_max);
          const zero=document.createElement('button');zero.textContent='0';zero.onclick=()=>updateHp(c.id,0);
          controls.append(dmg5,dmg10,heal,zero);
          div.append(left,controls);
          container.appendChild(div);

          const opt=document.createElement('option');opt.value=c.id;opt.textContent=c.name;rollChar.appendChild(opt);
        });
      }

      async function updateHp(id,value){
        await fetch(`/api/characters/${id}/hp`,{
          method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({hp_current:value})
        });
        await render();
      }

      document.getElementById('roll-btn').addEventListener('click',async ()=>{
        const charId = document.getElementById('roll-char').value;
        const sides = parseInt(document.getElementById('sides').value,10);
        const modifier = parseInt(document.getElementById('modifier').value,10)||0;
        const base = Math.floor(Math.random()*sides)+1;
        const payload = { charId, result: base, modifier };
        const res = await fetch('/api/rolls', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload) });
        const data = await res.json().catch(()=>null);
        document.getElementById('roll-result').textContent = data ? `Rolled: ${data.rollResult} (base ${data.result} ${modifier>=0?'+':''}${data.modifier})` : 'Roll sent';
      });

      // refresh every 2s to show live state
      render();setInterval(render,2000);
    </script>
  </body>
</html>
